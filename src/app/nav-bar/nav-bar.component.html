<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top p-3">
  <div class="container-fluid">
    <!-- BRAND -->
    <a class="navbar-brand" routerLink="/">HSPA</a>

    <!-- TOGGLER -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- NAV CONTENT -->
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <!-- LEFT MENU -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Buy
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/rent-property"
            routerLinkActive="active"
          >
            Rent
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/add-property"
            routerLinkActive="active"
          >
            List Property (Free)
          </a>
        </li>
      </ul>

      <!-- RIGHT MENU -->
      <ul class="navbar-nav ms-auto">
        <!-- NOT LOGGED IN -->
        <li *ngIf="!loggedIn()" class="nav-item">
          <a
            class="nav-link"
            routerLink="user/register"
            routerLinkActive="active"
          >
            Register
          </a>
        </li>

        <li *ngIf="!loggedIn()" class="nav-item">
          <a class="nav-link" routerLink="user/login" routerLinkActive="active">

          </a>

          <a class="nav-link" (click)="onLogout()">Logout</a>
        </li> -->

        <div *ngIf="loggedIn()" class="dropdown me-5" dropdown>
          <a
            href="javascript:void(0)"
            class="dropdown-toggle text-light"
            dropdownToggle
            style="cursor: pointer"
          >
            Welcome {{ loggedinUser }}
          </a>

          <div *dropdownMenu class="dropdown-menu dropdown-menu-end">
            <a class="dropdown-item">
              <i class="fas fa-tachometer-alt"></i> View Dashboard
            </a>

            <a class="dropdown-item">
              <i class="far fa-user-circle"></i> My Profile
            </a>

            </a>

            <a class="dropdown-item" (click)="onLogout()">

            </a>
